version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: flood_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-flood_alert}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - flood_db_data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-flood_alert}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: flood_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  nodered:
    image: nodered/node-red:latest
    container_name: flood_nodered
    restart: unless-stopped
    volumes:
      - flood_nodered_data:/data
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: 
      context: ./backend
      target: production
    container_name: flood_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: flood_frontend
    restart: unless-stopped
    env_file: .env

  nginx:
    image: nginx:alpine
    container_name: flood_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - frontend
      - backend

volumes:
  flood_db_data:
  flood_nodered_data:

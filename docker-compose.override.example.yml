version: "3.8"

services:
  db:
    ports:
      - "127.0.0.1:5433:5432"

  mqtt:
    ports:
      - "127.0.0.1:1883:1883"

  nodered:
    ports:
      - "127.0.0.1:1880:1880"
    volumes:
      - ./nodered/data:/data

  backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/var/www/html
    ports:
      - "127.0.0.1:8000:80"

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
